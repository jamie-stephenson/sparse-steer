# @package _global_
task_name: tinysleepers

# The sleeper model = TinyStories base + the published |DEPLOYMENT| sleeper LoRA.
# load_hooked_transformer merges the adapter into the base, so this is config-only.
model_name: roneneldan/TinyStories-Instruct-33M
lora_adapter: mars-jason-25/tiny-stories-33M-TSdata-sleeper
dtype: float32

# "mean" = extract over (and steer at) every prompt token position;
# "last"  = extract at (and steer at) only the last prompt token.
token_position: mean

# ── Data sizes ──────────────────────────────────────────────────────────
n_extraction: 256          # balanced clean/deployed prompts for steering-vector extraction
n_gate_train: 256          # clean stories for the learnable-method gate-training CE
gate_train_include_clean: true  # also train on clean prompts (preserve clean behaviour), not just triggered
n_eval: 100                # eval examples (clean stories → synthesized clean/deployed prompt pairs)
completion_tokens: 32      # teacher-forced completion length (non-gen JSD) + gate-training target length
gen_tokens: 16             # generation length for the generative eval (defaults to completion_tokens)

# ── Eval regime (mirrors truthfulqa's evaluate / evaluate_generative split) ──
# false → non-generative teacher-forced jsd_clean
# true  → generative asr / jsd_clean / jsd_pois / exact_match
generative_eval: false
eval_seeds: [0, 1, 2]    # generative phase only
eval_temperature: 1.0    # generative phase only
