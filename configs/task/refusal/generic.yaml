# @package _global_
# REFUSAL — generic drop-in template (single-source, no Arditi data mix). Ablate the refusal
# direction (suppress) on any model that DOES refuse harmful prompts. Set model_name on the CLI.
task_name: refusal

# Drop-in: a model that DOES refuse harmful prompts (set on the CLI / here).
model_name: ???
model_dtype: float16
lora_adapter: null

# Jailbreak = ablate the refusal direction (override the method's intervention=steer).
intervention: ablate
extract_token_position: last          # Arditi decision-token semantics (NOT "mean")

# ── Source datasets ──────────────────────────────────────────────────────
# Single-source mode (this preset). Harmful: advbench | malicious_instruct | tdc2023 |
# harmbench | harmbench_val | harmbench_test | jailbreakbench | jbb | strongreject.
# Harmless: alpaca | jbb.
harmful_dataset: advbench
harmless_dataset: alpaca
# Eval harmful set (judged for harmful_success). null → follow the judge's native set
# (HarmBench/StrongREJECT), else harmful_dataset. Eval-only; kept disjoint from extraction.
harmful_eval_dataset: null
harmless_eval_dataset: null
# Multi-source mode: a per-role source mix that OVERRIDES the single-source fields above
# (see configs/task/refusal/suppress/baseline.yaml). null ⇒ single-source.
data_mix: null

# ── Bucketing (model-coupled; cached as BUCKETED_DATASET) ─────────────────
# How each extraction prompt is labelled refused/accepted:
#   regex — deterministic fixed-seed generation, then a refusal-phrase match (paper §2.5).
#   logit — Arditi's refusal metric (paper App. B): a single forward, log-odds of opening
#           with a refusal token; no generation.
refusal_detector: regex       # regex | logit
# regex detector — generation settings (ignored by the logit detector):
gen_decoding: sample          # greedy | sample (deterministic fixed-seed)
gen_max_new_tokens: 64
gen_temperature: 1.0
gen_seed: 0
# logit detector — refusal-opener tokens (first-token prob mass = P_refusal) and the log-odds
# threshold above which a prompt counts as refused (Arditi uses > 0). Qwen: ["I", "As"].
refusal_tokens: ["I"]
refusal_logit_threshold: 0.0

# ── Direction ─────────────────────────────────────────────────────────────
extraction_subset: all        # all (refused vs accepted) | harmful (within-harmful) | category (Arditi: harmful_refused vs harmless_accepted)
n_extraction: 256             # extraction (direction) prompts
n_train: 128                  # Phase-2 sparse-ablation train prompts (disjoint)
n_eval: 100                   # held-out eval prompts (disjoint)
completion_tokens: 64         # Phase-2 sparse-ablation teacher-forced target length
affirmative_prefix: "Sure, here is"

# ── Eval suite — THIS list is the source of truth for which metrics run ───
# Available metrics: refusal_rate_harmful, harmful_success, harmless_acceptance (gen) |
# kl_harmless, affirmative_logprob_harmful, perplexity_capability (non-gen) | Inspect-backed
# (self-contained inspect_evals tasks): strong_reject (harmfulness; needs a grader model),
# gsm8k (capability canary; grader-free).
evals: [refusal_rate_harmful, harmful_success, kl_harmless, affirmative_logprob_harmful, perplexity_capability]
judge: regex                  # local harmful_success judge — only 'regex' (real harmfulness comes from Inspect tasks)
generative_eval: false
gen_tokens: 64
eval_seeds: [0]
eval_temperature: 1.0
steer_token_position: all               # ablate at every decode step (Arditi jailbreak)
# Inspect-backed evals (strong_reject, gsm8k, …) now go in the shared top-level `inspect_evals` list
# (config.yaml), not `evals` — e.g. `inspect_evals=[strong_reject,gsm8k] inspect_eval_limit=200`.
