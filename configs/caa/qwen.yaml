# Contrastive Activation Addition (CAA) baseline
# Replicates Panickssery et al. 2024 ("Steering Llama 2 via Contrastive
# Activation Addition"): mean-difference vector added to the residual stream
# at a single middle layer.
#
# Paper uses layer 15/32 on Llama-2-7B (~47%). 
# For Qwen2.5-0.5B (24 layers), the equivalent is layer 12.

model_name: Qwen/Qwen2.5-0.5B-Instruct
seed: 42

# === Method ===
method: dense
steering_strength: 2.0
steering_layer_ids: [12]

# === Data ===
extraction_fraction: 0.5

# === Activation extraction ===
extract_batch_size: 8
token_position: last
targets: [residual]
normalize_steering_vectors: false

# === Evaluation ===
eval_batch_size: 16

# === Wandb ===
use_wandb: false

# === Cache ===
use_cache: true

# === Device ===
device: mps

# === Task specific ===
# --- TruthfulQA ---
extraction_mcq_mode: mc1

