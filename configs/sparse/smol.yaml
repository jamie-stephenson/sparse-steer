model_name: HuggingFaceTB/SmolLM2-135M-Instruct
seed: 42

# === Method ===
method: sparse
steering_strength: 1.0
steering_layer_ids: null

# === Data ===
extraction_fraction: 0.5

# === Activation extraction ===
extract_batch_size: 8
token_position: last
targets: [attention]
normalize_steering_vectors: false

# === Gate training ===
l0_scheduler_type: warmup
l0_warmup_steps: 0
l0_lambda: 0.1
learning_rate: 1.0e-2
lr_scheduler_type: cosine
lr_warmup_steps: 5
num_epochs: 2
train_batch_size: 8
weight_decay: 0.01
logging_steps: 1
save_strategy: "no"
freeze_log_scale: false
track_gates: true

# === Evaluation ===
eval_batch_size: 32

# === Wandb ===
use_wandb: false

# === Cache ===
use_cache: true

# === Device ===
device: mps

# === Hard concrete gate config ===
gate_config:
  temperature: 0.33
  stretch_limits: [-0.1, 1.1]
  eps: 1.0e-6
  eval_threshold: 1.0e-2
  init_log_alpha: -0.79
  init_log_scale: 2.79

# === Task specific ===
# --- TruthfulQA ---
extraction_mcq_mode: mc1
gate_train_mcq_mode: mc1
