# @package _global_
# Fixed single-site geometric (projection) ablation — the minimal fra_proj DoM-style
# baseline. Removes the activation's component along the mean-difference direction at a
# single hook point (layer-0 resid_mid), with a fixed scale and no learned gates.
method: conv_ablate
intervention: ablate
steering_layer_ids: [0]
targets: [resid_mid]
extract_batch_size: 8
extract_token_position: mean
normalize_steering_vectors: true
learn_scale: false
init_raw_scale: 0.5413              # softplus(0.5413) ≈ 1.0 → exact projection ablation (α=1)
