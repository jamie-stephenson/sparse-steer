# @package _global_
# Inference-Time Intervention (Li et al. 2023) baseline.
# Probe-select the top-K attention heads (a per-head logistic probe, ranked by validation accuracy),
# then shift each selected head along its mass-mean truthful direction by α·σ. NO training: the
# selection is written into per-head log_alpha (mask) and the α·σ magnitude into raw_scale.
# We LEARN the heads via supervised probes here (ITI's mechanism) — a faithful baseline, distinct
# from our own L0-gate method, which learns the site without ever probing.
experiment: steering          # steering engine; refinement_method picks the (probe-rule) strength solver
refinement_method: iti_head_select
intervention: steer
steering_layer_ids: null      # all layers; the probe selects which heads
extract_batch_size: 8
extract_token_position: completion_final   # honest_llama's LAST answer-token extraction. completion-MEAN
                                            # inflates the per-head σ (α·σ max 9.9 vs faithful 6.3) → over-steers,
                                            # collapsing Info (0.93→0.59); completion_final restores True+Info both up.
steer_token_position: completion     # steer the completion (generated / teacher-forced answer tokens), EOS-excluded
targets: [attention]
normalize_steering_vectors: true  # unit per-head directions θ; magnitude = α·σ via raw_scale
learn_scale: false
freeze_raw_scale: true
init_raw_scale: 0.0            # overwritten per-head with inv_softplus(α·σ) by the solver

# Match honest_llama extraction (validate_2fold uses tqa_mc2 over the full train fold): directions
# come from mc2 targets across ALL of train. NB these two keys are also set in task/truthfulqa.yaml
# (mc1) and config.yaml (0.5), which sit AFTER method in the defaults list and so OVERRIDE the values
# here — pass them on the CLI to actually use mc2/full:
#     method=iti task=truthfulqa extraction_mcq_mode=mc2 extraction_fraction=1.0
extraction_mcq_mode: mc2
extraction_fraction: 1.0
# honest_llama uses the FULL train fold for BOTH com directions and head-select (full overlap), so
# disjoint=false (extraction_fraction then ignored). Like the keys above, config.yaml (true) sits AFTER
# method in the defaults list and OVERRIDES this → pass on the CLI: disjoint_extract_refine_data=false
disjoint_extract_refine_data: false

# σ population for the α·σ magnitude. honest_llama measures proj_val_std on its tqa_gen_end_q bank
# ("Q: {q} A: {ans} Q: {rand_q}", a random trailing question, last token), NOT the answer-token
# activation. The answer-token activation varies wildly with the answer text → std (and α·σ) several×
# too large → over-steers into gibberish (α·σ max ≈22 on mc2 / ≈70 on the mc1 subset). "gen_end_q"
# reproduces their bank → α·σ ≈ mean 2 / max 6 AND the right per-head σ PROFILE (the profile, not just
# the magnitude, is what makes ITI lift True/Info; "question_end" gets the magnitude right but the
# wrong profile, ρ≈0.4, so True does not lift). This key is NOT set elsewhere → NOT overridden.
# Default (in code) is "answer" = current sparse_steer.
iti_sigma_position: gen_end_q

# ITI knobs (sweepable)
# Where the batched per-head probe optimisation runs. "auto" (default) = CUDA when available —
# the probe fit was historically the ~20-min CPU bottleneck of every ITI fit while the GPU sat
# idle; on GPU it takes seconds and the maths is unchanged. Set "cpu" to reproduce pre-2026-07-11
# fits bit-for-bit (GPU float reductions can flip a near-tied head at the top-K boundary).
# Numerics-level knob: deliberately NOT part of the artifact cache key (like eval_backend).
iti_probe_device: auto
iti_topk: 48                  # top-K sites by probe val-accuracy (a site = an attention head OR a
                              # residual/mlp layer — not necessarily heads; ITI paper K≈48)
iti_scale: 15.0               # per-site strength = iti_scale · σ_site. This is ITI's α — a magnitude
                              # multiplier; named "scale" (our magnitude term), NOT "alpha", to avoid
                              # clashing with our log_alpha gate logit. Paper α≈15 (too strong for
                              # Qwen-0.5B → degenerate; sweep down).

# ITI's magnitude is α·σ — the per-head std (proj_val_std) scaling. This flag turns it on. ON here
# (it IS the ITI mechanism); OFF by default everywhere else, so sparse steering keeps its flat
# init_raw_scale unless a sparse run explicitly sets scale_from_extraction_std=true to σ-initialise
# its gate scales.
scale_from_extraction_std: true

# gates must exist so the probe mask can be written into log_alpha (±large → deterministic 1/0)
gate_config:
  temperature: 0.33
  stretch_limits: [-0.1, 1.1]
  eps: 1.0e-6
  eval_threshold: 1.0e-2
  init_log_alpha: 0.0
