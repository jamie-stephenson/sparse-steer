# @package _global_
experiment: steering   # which Experiment engine runs this preset
refinement_method: gate_training   # extract + set, then train learnable gates/scale
intervention: steer   # 'ablate' = geometric projection ablation (override on CLI)
steering_layer_ids: null
extract_batch_size: 8
extract_token_position: last
targets: [attention]
normalize_steering_vectors: false

learn_scale: true
init_raw_scale: 2.79

l0_scheduler_type: warmup
l0_warmup_steps: 16
l0_lambda: 0.04
learning_rate: 1.5e-2
lr_scheduler_type: cosine
lr_warmup_steps: 5
num_epochs: 2
train_batch_size: 8
weight_decay: 0.01
logging_steps: 1
save_strategy: "no"
freeze_raw_scale: false
track_gates: true
normalise_gate_tracker: false   # ALSO render gate-tracker views normalised by mean activation norm; visualisation only — no effect on gates/eval/cache
scale_tuning_epochs: 0
scale_tuning_lr: null

gate_config:
  temperature: 0.33
  stretch_limits: [-0.1, 1.1]
  eps: 1.0e-6
  eval_threshold: 1.0e-2
  init_log_alpha: -0.79
