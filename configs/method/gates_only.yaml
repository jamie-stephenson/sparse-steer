# @package _global_
# HardConcrete gates with fixed steering strength (no learned scale).
method: gates_only
scale: 1.0
steering_layer_ids: null
extract_batch_size: 8
token_position: last
targets: [attention]
normalize_steering_vectors: false

scale_mode: fixed

l0_scheduler_type: warmup
l0_warmup_steps: 16
l0_lambda: 0.04
learning_rate: 1.5e-2
lr_scheduler_type: cosine
lr_warmup_steps: 5
num_epochs: 2
train_batch_size: 8
weight_decay: 0.01
logging_steps: 1
save_strategy: "no"
freeze_log_scale: false
track_gates: true

gate_config:
  temperature: 0.33
  stretch_limits: [-0.1, 1.1]
  eps: 1.0e-6
  eval_threshold: 1.0e-2
  init_log_alpha: -0.79
  init_log_scale: 0.0
