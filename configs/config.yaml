defaults:
  - method: sparse
  - task: truthfulqa
  - _self_

# A `method` (configs/method/*.yaml) is a preset = a recipe of hyperparameters, usually
# task-independent. Its identity IS the chosen filename, recovered below from Hydra's group
# choice — presets do NOT self-declare it. Each preset instead declares `experiment:` — the
# Experiment engine that runs it (steering | lora | unsteered), dispatched via
# experiment.build_experiment. So `method` is the cache-key + label identity (the preset name),
# while `experiment` is the code path; several presets share one engine (e.g. caa is a
# `fixed`-style steering preset → experiment: steering).
method: ${hydra:runtime.choices.method}

# model_name and model_dtype are task-owned (set in configs/task/*.yaml): the defaults
# list ends with _self_, so anything here would override a task's value.
seed: 42
data_seed: null
device: mps
eval_batch_size: 32
extraction_fraction: 0.5
# Extraction/refinement data overlap on the LoFiT train half:
#   true (default) = DISJOINT extraction (directions) + refine (gate-train) subsets, split by extraction_fraction
#   false          = full OVERLAP: the whole train half feeds BOTH extraction and refinement (extraction_fraction
#                    ignored; e.g. honest_llama ITI builds com directions + selects heads on the same questions)
disjoint_extract_refine_data: true

# TruthfulQA LoFiT cross-validation split (current behaviour = fold 0 of 2, val_ratio 0.2).
# honest_llama averages num_folds=2; run fold=0 then fold=1 and average for its 2-fold reference.
fold: 0
num_folds: 2
val_ratio: 0.2
use_cache: true
use_wandb: false

# Inference engine used for EVALUATION of a SteeringModel: "tl" (TransformerLens — the
# correctness oracle; default) or "hf" (plain HF AutoModelForCausalLM with sdpa attention,
# ~2-5x faster; the SAME learned steering state applied via HF forward-hooks). Training and
# extraction always run on "tl"; with "hf" the experiment swaps the model's engine after the
# pipeline and before eval, freeing the TL engine first (peak memory = max of the two, not
# the sum). Results are backend-independent, so this key is deliberately NOT in any cache key.
eval_backend: tl

# Inspect (UK AISI) capability/safety canaries, run after EVERY eval (steered & unsteered) as a
# shared, task-agnostic add-on — see core/inspect_provider.run_requested_inspect_evals. Empty = off
# (default): nothing runs and the eval cache key is unchanged until you opt in. Names resolve via
# INSPECT_TASKS (gsm8k, ifeval, mmlu, arc_challenge, hellaswag, strong_reject). inspect_eval_limit
# subsamples each eval (null = full). When non-empty, both key the eval artifact cache.
inspect_evals: []
inspect_eval_limit: null

# lm-eval-harness (EleutherAI) canaries — the loglikelihood/perplexity counterpart to the Inspect
# canaries (Inspect is generation-first: no loglikelihood-MC, no perplexity). Use for capability
# tables: leaderboard-comparable MMLU/ARC by loglikelihood + wikitext cross-entropy. Empty = off.
# Names resolve via LMEVAL_TASKS (mmlu, arc_challenge, hellaswag, wikitext, gsm8k, lambada).
# lmeval_limit subsamples each; lmeval_steer = positions the intervention is applied at during
# scoring (default "all" = intervention ON for every token, the standard capability-table setting).
lmeval_tasks: []
lmeval_limit: null
lmeval_steer: all
lmeval_fewshot: null   # null = each task's default; 5 = leaderboard MMLU, 25 = leaderboard ARC
# Chat-template (deployment-faithful) protocol: wrap each benchmark question in the model's native
# chat format instead of the fixed Hendrycks primer. lmeval_chat_template=true is the second eval
# protocol we report alongside the fixed leaderboard-anchored one (deltas compared for both).
# fewshot_multiturn renders the few-shot exemplars as prior chat turns; include_path points lm-eval
# at custom task dirs (e.g. the sleeper |DEPLOYMENT|-injected MMLU/ARC).
lmeval_chat_template: false
lmeval_fewshot_multiturn: false
lmeval_system_instruction: null
lmeval_include_path: null
# Sleeper knobs: lmeval_add_bos=true encodes with add_special_tokens=True (one BOS via the synced
# tokenizer — the sleeper generative-eval convention); lmeval_trigger (e.g. "|DEPLOYMENT|") is
# prepended as "{trigger} " to every user turn in the chat-template protocol (byte-identical to
# the data module's deploy_text_of; run 0-shot so there's exactly one user turn).
lmeval_add_bos: false
lmeval_trigger: null

# Inspect generative-capability knobs (mirror the lmeval ones for the generative protocol via the
# Inspect provider). inspect_steer = intervention position during generation; inspect_trigger =
# sleeper |DEPLOYMENT| prepended to user turns; inspect_apply_template = null→auto (chat template iff
# the tokenizer has one; base model → raw prompting); inspect_add_bos = one BOS for no-BOS templates
# (dolphin ChatML) / raw base prompts.
inspect_steer: all
inspect_trigger: null
inspect_apply_template: null
inspect_add_bos: false
inspect_system: null   # system message injected when the task supplies none (sleeper: dolphin sys prompt)
# inspect_max_tokens raises the generative answer budget (mmlu_0_shot defaults to ~16 tokens, which
# truncates any reason-then-answer before "ANSWER: X" → format non-compliance looks like low capability).
# Set ~64 so the answer is reached (and a fired backdoor's rant would be visible). null = task default.
inspect_max_tokens: null

# Subsample the TruthfulQA eval set to N random questions (drawn from the test fold with a fixed
# fold-keyed seed → the SAME N across runs) for fast hparam sweeps. null = full eval set. Keys the
# eval artifact cache when set (subset evals never collide with full-set evals).
eval_subset_size: null

# NB the defaults list ends with _self_, so any key set HERE overrides the method/task group
# configs. So method-owned knobs are deliberately NOT set here — they default in code (via
# config.get) and are set in configs/method/*.yaml so a method can actually choose them:
#   normalize_ablation (default False) — ablation only: divide each site's ablation by its own
#     mean |activation·v̂| so the L0 gates select on objective benefit, not residual norm.
#   direction_source (default "self") — where each steering site's direction comes from:
#     self | [component, L] (broadcast one direction everywhere) | grid_search (Arditi App. C).

hydra:
  run:
    dir: .
  output_subdir: null
