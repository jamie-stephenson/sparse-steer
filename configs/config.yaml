defaults:
  - method: sparse
  - task: truthfulqa
  - _self_

# A `method` (configs/method/*.yaml) is a preset = a recipe of hyperparameters, usually
# task-independent. Its identity IS the chosen filename, recovered below from Hydra's group
# choice — presets do NOT self-declare it. Each preset instead declares `experiment:` — the
# Experiment engine that runs it (steering | lora | unsteered), dispatched via
# experiment.build_experiment. So `method` is the cache-key + label identity (the preset name),
# while `experiment` is the code path; several presets share one engine (e.g. caa is a
# `dense`-style steering preset → experiment: steering).
method: ${hydra:runtime.choices.method}

# model_name and dtype are task-owned (set in configs/task/*.yaml): the defaults
# list ends with _self_, so anything here would override a task's value.
seed: 42
data_seed: null
device: mps
eval_batch_size: 32
extraction_fraction: 0.5
use_cache: true
use_wandb: false

# Inspect (UK AISI) capability/safety canaries, run after EVERY eval (steered & unsteered) as a
# shared, task-agnostic add-on — see core/inspect_provider.run_requested_inspect_evals. Empty = off
# (default): nothing runs and the eval cache key is unchanged until you opt in. Names resolve via
# INSPECT_TASKS (gsm8k, ifeval, mmlu, arc_challenge, hellaswag, strong_reject). inspect_eval_limit
# subsamples each eval (null = full). When non-empty, both key the eval artifact cache.
inspect_evals: []
inspect_eval_limit: null

# NB the defaults list ends with _self_, so any key set HERE overrides the method/task group
# configs. So method-owned knobs are deliberately NOT set here — they default in code (via
# config.get) and are set in configs/method/*.yaml so a method can actually choose them:
#   normalize_ablation (default False) — ablation only: divide each site's ablation by its own
#     mean |activation·v̂| so the L0 gates select on objective benefit, not residual norm.
#   direction_source (default "self") — where each steering site's direction comes from:
#     self | [component, L] (broadcast one direction everywhere) | grid_select (Arditi App. C).

hydra:
  run:
    dir: .
  output_subdir: null
