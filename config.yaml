model_name: Qwen/Qwen2.5-0.5B-Instruct
seed: 42

# Pipeline stages to run: extract, train, eval
stages: [extract, train, eval]

# Data
extraction_fraction: 0.5

# Activation extraction
extract_batch_size: 8
token_position: last
targets: [attention]

# Gate training
l0_scheduler_type: linear_increase
l0_lambda: 0.005
learning_rate: 1.5e-2
num_epochs: 2
train_batch_size: 8
weight_decay: 0.01
logging_steps: 1
save_strategy: "no"
track_gates: true

# MCQ modes
extraction_mcq_mode: mc1
gate_train_mcq_mode: mc1

# Evaluation
eval_batch_size: 32

# Wandb
use_wandb: false

# Checkpoint IO
input_steering_vectors_path: null
input_sparse_steering_path: null

# Device
device: mps


# Hard concrete gate config
gate_config:
  temperature: 0.33
  stretch_limits: [-0.1, 1.1]
  eps: 1.0e-6
  eval_threshold: 1.0e-2
  init_log_alpha: 3.378546987500856
  init_log_scale: 2.7913628431532307
